<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="#0B0F19" />
  <!-- Outer glowing circle -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#grad)" stroke-width="8" opacity="0.4" filter="url(#glow)" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#grad)" stroke-width="4" opacity="0.8" />
  <!-- Delivery Truck SVG Graphics -->
  <g transform="translate(48, 80)" fill="url(#grad)" filter="url(#glow)">
    <!-- Road Line -->
    <rect x="20" y="270" width="376" height="12" rx="6" fill="#10B981" />
    <!-- Truck Cabin -->
    <path d="M 270,120 L 330,120 C 345,120 365,130 375,145 L 400,185 C 405,195 405,210 400,220 L 390,240 C 385,250 375,255 360,255 L 270,255 Z" fill="#3B82F6" />
    <!-- Cabin Window -->
    <path d="M 285,135 L 325,135 C 333,135 342,140 347,148 L 368,180 C 372,186 370,195 363,195 L 285,195 Z" fill="#0B0F19" opacity="0.8" />
    <!-- Truck Cargo Body -->
    <rect x="20" y="80" width="240" height="175" rx="16" fill="url(#grad)" />
    <!-- Cargo Details (Fast lines) -->
    <rect x="50" y="110" width="120" height="12" rx="6" fill="#0B0F19" opacity="0.3" />
    <rect x="70" y="140" width="120" height="12" rx="6" fill="#0B0F19" opacity="0.3" />
    <rect x="50" y="170" width="100" height="12" rx="6" fill="#0B0F19" opacity="0.3" />
    <!-- Wheels -->
    <circle cx="100" cy="270" r="36" fill="#0B0F19" stroke="#3B82F6" stroke-width="6" />
    <circle cx="100" cy="270" r="14" fill="#3B82F6" />
    <circle cx="310" cy="270" r="36" fill="#0B0F19" stroke="#3B82F6" stroke-width="6" />
    <circle cx="310" cy="270" r="14" fill="#3B82F6" />
  </g>
</svg>
